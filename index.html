<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#7ec0ee" />
  <title>The Dragon World</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="stage">
    <canvas id="game"></canvas>

    <!-- On-screen controls (touch + mouse). Visible always per spec. -->
    <div class="controls" id="controls" aria-hidden="false">
      <div class="pad-left">
        <button class="btn move" id="btn-left" aria-label="Move left">◀</button>
        <button class="btn move" id="btn-right" aria-label="Move right">▶</button>
      </div>
      <div class="pad-right">
        <button class="btn jump" id="btn-jump" aria-label="Jump">JUMP</button>
      </div>
    </div>

    <!-- Top-right system buttons -->
    <div class="sysbar">
      <button class="sysbtn" id="btn-mute" aria-label="Mute">🔊</button>
      <button class="sysbtn" id="btn-pause" aria-label="Pause">⏸</button>
    </div>

    <!-- Start screen -->
    <div class="overlay" id="overlay-start">
      <div class="panel">
        <h1>The Dragon World</h1>
        <p class="tagline">Jump to touch the friendly dragons — they turn into stars! Watch out for the falling fire.</p>
        <p class="label">Choose how tricky:</p>
        <div class="difficulty" id="difficulty">
          <button class="diff" data-diff="easy">Easy</button>
          <button class="diff selected" data-diff="medium">Medium</button>
          <button class="diff" data-diff="brave">Brave</button>
        </div>
        <button class="play" id="btn-play">▶ Play</button>
        <p class="hint">Move: ← → or A D &nbsp;·&nbsp; Jump: Space / ↑ &nbsp;·&nbsp; Pause: P &nbsp;·&nbsp; Mute: M</p>
      </div>
    </div>

    <!-- Pause screen -->
    <div class="overlay hidden" id="overlay-pause">
      <div class="panel">
        <h1>Paused</h1>
        <button class="play" id="btn-resume">▶ Resume</button>
        <button class="secondary" id="btn-restart-pause">↺ Restart</button>
      </div>
    </div>

    <!-- Game over screen -->
    <div class="overlay hidden" id="overlay-over">
      <div class="panel">
        <h1>Game Over</h1>
        <p class="score-line">Score: <span id="final-score">0</span></p>
        <p class="score-line small">Dragons collected: <span id="final-dragons">0</span></p>
        <button class="play" id="btn-again">▶ Play Again</button>
      </div>
    </div>

    <!-- Rotate hint (portrait) -->
    <div class="overlay hidden" id="overlay-rotate">
      <div class="panel">
        <h1>↻</h1>
        <p class="tagline">Turn your device sideways to play!</p>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
